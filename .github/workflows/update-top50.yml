name: Update Grand Arena Top50 Data

on:
  schedule:
    # UTC 01:00, 07:00, 13:00 → 香港时间 09:00, 15:00, 21:00
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx[http2] tqdm

      - name: Run update script
        run: python grand_arena_full_top50.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add contests.json leaderboards/ data/
          git commit -m "Auto update contests & leaderboards - $(date '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
